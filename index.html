<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Vaquinha Online
</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="container">

<div class="top">

<h1>
🎯 Vaquinha Online
</h1>

<p class="subtitle">
Ajude a alcançar nossa meta ❤️
</p>

</div>

<div class="metaCard">

<div class="metaInfo">

<span>
Meta
</span>

<h2>
R$ 5.000
</h2>

</div>

<div class="progress">

<div
class="bar"
id="bar"
></div>

</div>

<p id="valorMeta">
R$ 0 arrecadados
</p>

</div>

<div class="card">

<label>
Quanto deseja contribuir?
</label>

<div class="inputBox">

<span>
R$
</span>

<input
id="valor"
type="text"
placeholder="0,00"
/>

</div>

<button
onclick="doar()"
id="btn"
>
Contribuir ❤️
</button>

<div id="resultado"></div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
